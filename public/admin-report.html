<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Report ore</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="/style.css" />
</head>
<body>
<header class="topbar">
  <h1>Report ore</h1>
  <div>
    <a href="/admin.html">Gestione dati</a> &nbsp;|&nbsp;
    <button class="linklike" id="logoutBtn">Esci</button>
  </div>
</header>
<main>
  <div class="card">
    <h2>Filtri</h2>
    <label for="monthSel">Mese</label>
    <input type="month" id="monthSel" />
    <label for="empFilter">Dipendente (opzionale)</label>
    <select id="empFilter"><option value="">Tutti</option></select>
    <label for="siteFilter">Cantiere (opzionale)</label>
    <select id="siteFilter"><option value="">Tutti</option></select>
    <button class="btn" id="filterBtn">Applica filtri</button>
    <a class="btn secondary" id="exportBtn" href="#">Esporta CSV</a>
  </div>

  <div class="card">
    <h2>Totale ore per dipendente</h2>
    <table id="totalsByEmpTable"><thead><tr><th>Dipendente</th><th>Ore totali</th></tr></thead><tbody></tbody></table>
  </div>

  <div class="card">
    <h2>Totale ore per dipendente e cantiere</h2>
    <table id="totalsBySiteTable"><thead><tr><th>Dipendente — Cantiere</th><th>Ore</th></tr></thead><tbody></tbody></table>
  </div>

  <div class="card">
    <h2>Note dei capisquadra</h2>
    <table id="notesTable">
      <thead><tr><th>Data</th><th>Caposquadra</th><th>Nota</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="card">
    <h2>Dettaglio movimenti</h2>
    <table id="detailTable">
      <thead><tr><th>Dipendente</th><th>Cantiere</th><th>Data</th><th>Ore</th><th>Note</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</main>
<script>
function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function currentMonth() {
  const d = new Date();
  return d.toISOString().slice(0, 7);
}

async function checkAuth() {
  const res = await fetch('/api/admin/check');
  const data = await res.json();
  if (!data.isAdmin) {
    location.href = '/admin-login.html';
    return false;
  }
  return true;
}

document.getElementById('logoutBtn').addEventListener('click', async () => {
  await fetch('/api/admin/logout', { method: 'POST' });
  location.href = '/admin-login.html';
});

async function loadFilters() {
  const [empRes, siteRes] = await Promise.all([
    fetch('/api/employees'), fetch('/api/worksites')
  ]);
  const emps = await empRes.json();
  const sites = await siteRes.json();
  document.getElementById('empFilter').innerHTML = '<option value="">Tutti</option>' +
    emps.map((e) => `<option value="${e.id}">${e.name}</option>`).join('');
  document.getElementById('siteFilter').innerHTML = '<option value="">Tutti</option>' +
    sites.map((s) => `<option value="${s.id}">${s.name}</option>`).join('');
}

function buildQuery() {
  const month = document.getElementById('monthSel').value;
  const employeeId = document.getElementById('empFilter').value;
  const worksiteId = document.getElementById('siteFilter').value;
  const params = new URLSearchParams();
  if (month) params.set('month', month);
  if (employeeId) params.set('employeeId', employeeId);
  if (worksiteId) params.set('worksiteId', worksiteId);
  return params;
}

async function loadReport() {
  const params = buildQuery();
  const res = await fetch('/api/admin/report?' + params.toString());
  const data = await res.json();

  const totEmpBody = document.querySelector('#totalsByEmpTable tbody');
  totEmpBody.innerHTML = Object.entries(data.totalsByEmployee)
    .map(([name, hours]) => `<tr><td>${name}</td><td>${hours.toFixed(2)}</td></tr>`).join('') ||
    '<tr><td colspan="2" class="muted">Nessun dato</td></tr>';

  const totSiteBody = document.querySelector('#totalsBySiteTable tbody');
  totSiteBody.innerHTML = Object.entries(data.totalsByEmployeeSite)
    .map(([name, hours]) => `<tr><td>${name}</td><td>${hours.toFixed(2)}</td></tr>`).join('') ||
    '<tr><td colspan="2" class="muted">Nessun dato</td></tr>';

  const notesBody = document.querySelector('#notesTable tbody');
  notesBody.innerHTML = (data.dailyNotes || []).map((n) => `
    <tr>
      <td>${n.work_date}</td>
      <td>${n.capo_name}</td>
      <td>${escapeHtml(n.note).replace(/\n/g, '<br>')}</td>
    </tr>
  `).join('') || '<tr><td colspan="3" class="muted">Nessuna nota</td></tr>';

  const detailBody = document.querySelector('#detailTable tbody');
  detailBody.innerHTML = data.rows.map((r) => `
    <tr>
      <td>${r.employeeName}</td>
      <td>${r.worksiteName}</td>
      <td>${r.date}</td>
      <td>${r.hours.toFixed(2)}</td>
      <td>${r.inCorso ? '<span class="badge">in corso</span>' : ''}</td>
    </tr>
  `).join('') || '<tr><td colspan="5" class="muted">Nessun dato</td></tr>';

  document.getElementById('exportBtn').href = '/api/admin/report.csv?' + params.toString();
}

document.getElementById('filterBtn').addEventListener('click', loadReport);

(async function init() {
  const ok = await checkAuth();
  if (!ok) return;
  document.getElementById('monthSel').value = currentMonth();
  await loadFilters();
  await loadReport();
})();
</script>
</body>
</html>
