<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cantieri — Seleziona caposquadra</title>
<link rel="icon" href="/icons/icon-192.png">
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#1f3a5f" />
<link rel="apple-touch-icon" href="/icons/icon-192.png" />
<link rel="stylesheet" href="/style.css" />
</head>
<body>
<header class="topbar">
  <h1>Gestione Cantieri</h1>
  <a href="/admin-login.html">Accesso ufficio</a>
</header>
<main>
  <div class="card">
    <h2>Chi sei?</h2>
    <p class="muted">Seleziona il tuo nome per aprire la tua squadra di oggi.</p>
    <div id="capoList" class="capo-list"></div>
    <p id="emptyMsg" class="muted hidden">Nessun caposquadra configurato. Contatta l'ufficio.</p>
  </div>
</main>
<footer class="note">Versione semplificata per la gestione giornaliera delle squadre</footer>
<script>
async function load() {
  const res = await fetch('/api/capisquadra');
  const list = await res.json();
  const container = document.getElementById('capoList');
  if (!list.length) {
    document.getElementById('emptyMsg').classList.remove('hidden');
    return;
  }
  list.forEach((c) => {
    const a = document.createElement('a');
    a.className = 'btn';
    a.href = '/squadra.html?capoId=' + c.id;
    a.textContent = c.role_label ? `${c.name} (${c.role_label})` : c.name;
    container.appendChild(a);
  });
}
load();
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
</body>
</html>
