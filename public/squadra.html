<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>La mia squadra</title>
<link rel="icon" href="/icons/icon-192.png">
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#1f3a5f" />
<link rel="apple-touch-icon" href="/icons/icon-192.png" />
<link rel="stylesheet" href="/style.css" />
</head>
<body>
<header class="topbar">
  <h1 id="capoTitle">La mia squadra</h1>
  <a href="/home.html">Cambia utente</a>
</header>
<main>
  <div id="msgArea"></div>

  <div class="card">
    <h2>Cantiere di oggi</h2>
    <p class="muted" id="currentSiteText">Nessun cantiere selezionato.</p>
    <label for="worksiteSelectToday">Seleziona il cantiere per tutta la squadra</label>
    <select id="worksiteSelectToday"></select>
    <button class="btn block" id="setSiteBtn">Imposta cantiere di oggi</button>
  </div>

  <div class="card">
    <h2>Aggiungi operaio alla squadra di oggi</h2>
    <label for="employeeSelect">Operaio</label>
    <select id="employeeSelect"></select>
    <button class="btn block" id="addBtn">Aggiungi alla squadra</button>
  </div>

  <div class="card">
    <div class="flex-between">
      <h2 style="margin:0">Squadra di oggi</h2>
      <button class="btn secondary small" id="closeDayBtn">Fine giornata (chiudi tutti)</button>
    </div>
    <div id="teamList"></div>
    <p id="emptyTeamMsg" class="muted hidden">Nessun operaio assegnato oggi.</p>
  </div>

  <div class="card">
    <h2>Nota di oggi</h2>
    <label for="dailyNoteText">Scrivi qui eventuali note sulla giornata (visibili all'ufficio)</label>
    <textarea id="dailyNoteText" rows="3" placeholder="Es. finito il getto, manca materiale, ecc."></textarea>
    <button class="btn block" id="saveNoteBtn">Salva nota</button>
  </div>
</main>

<!-- Modale: cambio cantiere -->
<div class="modal-overlay hidden" id="changeModal">
  <div class="modal-box">
    <h3>Cambia cantiere (solo per questa persona)</h3>
    <p id="changeModalName" class="muted"></p>
    <label for="newWorksiteSelect">Nuovo cantiere</label>
    <select id="newWorksiteSelect"></select>
    <div class="flex-between" style="margin-top:14px">
      <button class="btn secondary" id="cancelChangeBtn">Annulla</button>
      <button class="btn" id="confirmChangeBtn">Confirma cambio</button>
    </div>
  </div>
</div>

<!-- Modale: rimozione -->
<div class="modal-overlay hidden" id="removeModal">
  <div class="modal-box">
    <h3>Rimuovi dalla squadra</h3>
    <p id="removeModalName" class="muted"></p>
    <label for="removeReasonSelect">Motivo</label>
    <select id="removeReasonSelect">
      <option value="fine_giornata">Fine giornata / turno finito</option>
      <option value="altro_cantiere">Serve in un altro cantiere</option>
      <option value="malattia">Malattia / assenza</option>
      <option value="emergenza">Emergenza</option>
      <option value="altro">Altro</option>
    </select>
    <div class="flex-between" style="margin-top:14px">
      <button class="btn secondary" id="cancelRemoveBtn">Annulla</button>
      <button class="btn danger" id="confirmRemoveBtn">Confirma rimozione</button>
    </div>
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
const capoId = Number(params.get('capoId'));
if (!capoId) location.href = '/home.html';

let employees = [];
let worksites = [];
let activeAssignmentId = null;
let todaySiteId = null; // cantiere selezionato per tutta la squadra oggi
const SITE_STORAGE_KEY = 'cantiereOggi_capo_' + capoId;

function showMsg(text, type) {
  const area = document.getElementById('msgArea');
  area.innerHTML = `<div class="${type === 'error' ? 'error-msg' : 'success-msg'}">${text}</div>`;
  setTimeout(() => { area.innerHTML = ''; }, 5000);
}

function fmtTime(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
}

async function loadCapoName() {
  const res = await fetch('/api/capisquadra');
  const list = await res.json();
  const me = list.find((c) => c.id === capoId);
  document.getElementById('capoTitle').textContent = me ? `Squadra di ${me.name}` : 'La mia squadra';
}

async function loadEmployees() {
  const res = await fetch('/api/employees');
  employees = await res.json();
  const sel = document.getElementById('employeeSelect');
  sel.innerHTML = '<option value="">— Seleziona operaio —</option>' +
    employees.map((e) => `<option value="${e.id}">${e.name}${e.is_capo ? ' (caposquadra)' : ''}</option>`).join('');
}

async function loadWorksites() {
  const res = await fetch('/api/worksites');
  worksites = await res.json();
  const opts = '<option value="">— Seleziona cantiere —</option>' +
    worksites.map((w) => `<option value="${w.id}">${w.name}</option>`).join('');
  document.getElementById('worksiteSelectToday').innerHTML = opts;
  document.getElementById('newWorksiteSelect').innerHTML = opts;
}

function worksiteName(id) {
  const w = worksites.find((w) => w.id === Number(id));
  return w ? w.name : null;
}

function updateCurrentSiteText() {
  const text = document.getElementById('currentSiteText');
  const sel = document.getElementById('worksiteSelectToday');
  if (todaySiteId) {
    text.textContent = `Cantiere attuale: ${worksiteName(todaySiteId) || '—'}`;
    sel.value = String(todaySiteId);
  } else {
    text.textContent = 'Nessun cantiere selezionato. Selezionalo prima di aggiungere operai.';
  }
}

async function loadTeam() {
  const res = await fetch('/api/team?capoId=' + capoId);
  const rows = await res.json();
  const container = document.getElementById('teamList');
  container.innerHTML = '';

  // Deriva il cantiere di oggi dalle assegnazioni aperte (la squadra è di solito tutta sullo stesso cantiere).
  const openRows = rows.filter((r) => !r.end_time);
  if (openRows.length) {
    todaySiteId = openRows[0].worksite_id;
  } else if (!todaySiteId) {
    const stored = localStorage.getItem(SITE_STORAGE_KEY);
    if (stored) todaySiteId = Number(stored);
  }
  updateCurrentSiteText();

  if (!rows.length) {
    document.getElementById('emptyTeamMsg').classList.remove('hidden');
    return;
  }
  document.getElementById('emptyTeamMsg').classList.add('hidden');
  rows.forEach((r) => {
    const div = document.createElement('div');
    div.className = 'team-member' + (r.end_time ? ' closed' : '');
    const badge = r.end_time
      ? `<span class="badge closed-badge">Uscito alle ${fmtTime(r.end_time)}</span>`
      : `<span class="badge">In cantiere</span>`;
    div.innerHTML = `
      <div class="row1">
        <span class="name">${r.employee_name}</span>
        ${badge}
      </div>
      <div class="site">${r.worksite_name}</div>
      <div class="time">Dalle ${fmtTime(r.start_time)}${r.end_time ? ' alle ' + fmtTime(r.end_time) : ''}</div>
      ${r.end_time ? '' : `<div class="actions">
        <button class="btn small secondary" data-action="change" data-id="${r.id}" data-name="${r.employee_name}">Cambia cantiere</button>
        <button class="btn small danger" data-action="remove" data-id="${r.id}" data-name="${r.employee_name}">Rimuovi</button>
      </div>`}
    `;
    container.appendChild(div);
  });

  container.querySelectorAll('[data-action="change"]').forEach((btn) => {
    btn.addEventListener('click', () => openChangeModal(btn.dataset.id, btn.dataset.name));
  });
  container.querySelectorAll('[data-action="remove"]').forEach((btn) => {
    btn.addEventListener('click', () => openRemoveModal(btn.dataset.id, btn.dataset.name));
  });
}

document.getElementById('setSiteBtn').addEventListener('click', async () => {
  const newWorksiteId = Number(document.getElementById('worksiteSelectToday').value);
  if (!newWorksiteId) return showMsg('Seleziona un cantiere.', 'error');
  localStorage.setItem(SITE_STORAGE_KEY, String(newWorksiteId));
  // Se ci sono già operai assegnati oggi, sposta tutta la squadra sul nuovo cantiere.
  const res = await fetch('/api/team/change-site-bulk', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ capoId, newWorksiteId }),
  });
  const data = await res.json();
  if (!res.ok) return showMsg(data.error || 'Errore', 'error');
  todaySiteId = newWorksiteId;
  updateCurrentSiteText();
  showMsg(
    data.changed > 0
      ? `Cantiere aggiornato per ${data.changed} operai.`
      : 'Cantiere di oggi impostato.',
    'success'
  );
  loadTeam();
});

document.getElementById('addBtn').addEventListener('click', async () => {
  const employeeId = document.getElementById('employeeSelect').value;
  if (!todaySiteId) {
    return showMsg('Seleziona prima il cantiere di oggi.', 'error');
  }
  if (!employeeId) {
    return showMsg('Seleziona l\'operaio.', 'error');
  }
  const res = await fetch('/api/team/add', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ capoId, employeeId, worksiteId: todaySiteId }),
  });
  const data = await res.json();
  if (!res.ok) return showMsg(data.error || 'Errore', 'error');
  document.getElementById('employeeSelect').value = '';
  showMsg('Operaio aggiunto alla squadra.', 'success');
  loadTeam();
});

async function loadDailyNote() {
  const res = await fetch('/api/team/note?capoId=' + capoId);
  const data = await res.json();
  document.getElementById('dailyNoteText').value = data.note || '';
}

document.getElementById('saveNoteBtn').addEventListener('click', async () => {
  const note = document.getElementById('dailyNoteText').value;
  const res = await fetch('/api/team/note', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ capoId, note }),
  });
  const data = await res.json();
  if (!res.ok) return showMsg(data.error || 'Errore', 'error');
  showMsg('Nota salvata.', 'success');
});

document.getElementById('closeDayBtn').addEventListener('click', async () => {
  if (!confirm('Chiudere la giornata per tutta la squadra? Verrà registrato l\'orario di uscita per tutti.')) return;
  const res = await fetch('/api/team/close-day', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ capoId }),
  });
  const data = await res.json();
  if (!res.ok) return showMsg(data.error || 'Errore', 'error');
  showMsg('Giornata chiusa per ' + data.closed + ' operai.', 'success');
  loadTeam();
});

function openChangeModal(assignmentId, name) {
  activeAssignmentId = assignmentId;
  document.getElementById('changeModalName').textContent = name;
  document.getElementById('newWorksiteSelect').value = '';
  document.getElementById('changeModal').classList.remove('hidden');
}
document.getElementById('cancelChangeBtn').addEventListener('click', () => {
  document.getElementById('changeModal').classList.add('hidden');
});
document.getElementById('confirmChangeBtn').addEventListener('click', async () => {
  const newWorksiteId = document.getElementById('newWorksiteSelect').value;
  if (!newWorksiteId) return showMsg('Seleziona il nuovo cantiere.', 'error');
  const res = await fetch('/api/team/change-site', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ assignmentId: activeAssignmentId, newWorksiteId }),
  });
  const data = await res.json();
  document.getElementById('changeModal').classList.add('hidden');
  if (!res.ok) return showMsg(data.error || 'Errore', 'error');
  showMsg('Cantiere aggiornato.', 'success');
  loadTeam();
});

function openRemoveModal(assignmentId, name) {
  activeAssignmentId = assignmentId;
  document.getElementById('removeModalName').textContent = name;
  document.getElementById('removeModal').classList.remove('hidden');
}
document.getElementById('cancelRemoveBtn').addEventListener('click', () => {
  document.getElementById('removeModal').classList.add('hidden');
});
document.getElementById('confirmRemoveBtn').addEventListener('click', async () => {
  const reason = document.getElementById('removeReasonSelect').value;
  const res = await fetch('/api/team/remove', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ assignmentId: activeAssignmentId, reason }),
  });
  const data = await res.json();
  document.getElementById('removeModal').classList.add('hidden');
  if (!res.ok) return showMsg(data.error || 'Errore', 'error');
  showMsg('Operaio rimosso dalla squadra.', 'success');
  loadTeam();
});

(async function init() {
  await loadCapoName();
  await Promise.all([loadEmployees(), loadWorksites(), loadDailyNote()]);
  await loadTeam();
  setInterval(loadTeam, 30000);
})();
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
</body>
</html>
